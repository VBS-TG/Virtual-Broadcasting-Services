# Console MVP-A — JWT 發放、遙測 WSS hub、健康檢查。
# 啟動：docker compose -f docker-compose.console.yml up --build
# 本機：http://127.0.0.1:4000

services:
  console:
    build:
      context: .
      dockerfile: apps/console/Dockerfile
    ports:
      - "4000:4000"
    environment:
      VBS_CONSOLE_HTTP_BIND: ":4000"
      # 開發用：正式環境請改為強隨機並以 secrets 注入
      VBS_CONSOLE_JWT_SECRET: ${VBS_CONSOLE_JWT_SECRET:-dev-console-jwt-secret-change-me}
      VBS_CONSOLE_ADMIN_TOKEN: ${VBS_CONSOLE_ADMIN_TOKEN:-dev-admin-token-change-me}
      VBS_CONSOLE_JWT_TTL_SEC: "3600"
