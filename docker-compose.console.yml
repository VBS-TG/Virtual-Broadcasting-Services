# Console — JWT、遙測 WSS、健康檢查。
# 必填：同目錄建立 .env.console（VBS_CONSOLE_JWT_SECRET、VBS_CONSOLE_ADMIN_TOKEN、VBS_CF_ACCESS_CLIENTS 等，勿提交版本庫）。
# 本機：http://127.0.0.1:5000（容器內仍為 :4000）
services:
  console:
    build:
      context: .
      dockerfile: apps/console/Dockerfile
    ports:
      - "5000:4000"
    env_file:
      - path: .env.console
        required: false
      - path: .env
        required: false
    environment:
      VBS_CONSOLE_HTTP_BIND: ":4000"
      VBS_CONSOLE_JWT_TTL_SEC: "3600"
      VBS_CF_ACCESS_MODE: service_token
