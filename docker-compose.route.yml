services:
  vbs-route:
    build:
      context: .
      dockerfile: apps/route/Dockerfile
    network_mode: host
    environment:
      - VBS_NODE_ID=vbs-route-01
      - VBS_LOG_LEVEL=info
      - VBS_METRICS_INTERVAL=1000ms
      # 必填：請改為實際 Console HTTPS 基底與憑證（勿提交真實值至版本庫）
      - VBS_CONSOLE_BASE_URL=${VBS_CONSOLE_BASE_URL}
      # 方案 A：預先注入節點 JWT
      - VBS_ROUTE_JWT=${VBS_ROUTE_JWT}
      # 方案 A2：正式版 device 身分註冊，自動換發/續約 JWT
      - VBS_ROUTE_DEVICE_ID=${VBS_ROUTE_DEVICE_ID:-vbs-route-01}
      - VBS_ROUTE_DEVICE_SECRET=${VBS_ROUTE_DEVICE_SECRET}
      # 方案 A3：Cloudflare Access service token（正式版建議）
      - VBS_CF_ACCESS_CLIENT_ID=${VBS_CF_ACCESS_CLIENT_ID}
      - VBS_CF_ACCESS_CLIENT_SECRET=${VBS_CF_ACCESS_CLIENT_SECRET}
      # 方案 B：只給 bootstrap token，由 Route 自動向 Console 換短效 JWT
      - VBS_ROUTE_BOOTSTRAP_TOKEN=${VBS_ROUTE_BOOTSTRAP_TOKEN}
      - VBS_SRT_PASSPHRASE=${VBS_SRT_PASSPHRASE}
      - VBS_ROUTE_TELEMETRY_WS_PATH=/vbs/telemetry/ws
      - VBS_ROUTE_SRTLA_INGEST_PORT=20020
      - VBS_ROUTE_SRT_OUTPUT_PORT=20030
      - VBS_ROUTE_INTERNAL_SRT_PORT=20021
      - VBS_ROUTE_LOSS_MAX_TTL=40
      - VBS_ROUTE_SRT_LATENCY_MS=2000
      - VBS_ROUTE_INGEST_IFACE=eth0
      # 預設啟動控制面；若要關閉請設 VBS_ROUTE_CONTROL_BIND=
      - VBS_ROUTE_CONTROL_BIND=:20080
      # 選用：行動網路 MTU（需映像內有 ip 指令，已於 Dockerfile 安裝 iproute2）
      # - VBS_ROUTE_MTU_IFACE=eth0
      # - VBS_ROUTE_MTU=1400
