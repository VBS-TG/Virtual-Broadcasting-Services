services:
  # 1. 媒體執行引擎 (Strom)
  vbs-strom:
    image: eyevinntechnology/strom:latest
    restart: always
    network_mode: host
    volumes:
      - ./data/strom:/data

  # 2. 持久化資料庫 (CouchDB)
  vbs-couchdb:
    image: couchdb:3
    restart: always
    network_mode: host
    env_file:
      - ./.env.engine
    environment:
      - COUCHDB_USER=${VBS_DB_USER:-admin}
      - COUCHDB_PASSWORD=${VBS_DB_PASSWORD:-admin1234}
    volumes:
      - ./data/couchdb:/opt/couchdb/data

  # 3. 中央管理 API (Open Live)
  vbs-open-live:
    image: vbs-open-live:local
    restart: always
    network_mode: host
    env_file:
      - ./.env.engine
    depends_on:
      - vbs-couchdb
      - vbs-strom
    environment:
      - PORT=18080
      - COUCHDB_URL=http://${VBS_DB_USER:-admin}:${VBS_DB_PASSWORD:-admin1234}@127.0.0.1:5984
      - COUCHDB_NAME=open-live
      - STROM_URL=http://127.0.0.1:8080
      - LOG_LEVEL=info

  # 4. SRT -> WHEP Gateway x8（1格1路，對應 input1..input8）
  vbs-srt-whep-1:
    image: eyevinntechnology/srt-whep:latest
    restart: always
    network_mode: host
    depends_on:
      - vbs-open-live
    command: >
      -i ${VBS_SRT_WHEP_INPUT_1:-127.0.0.1:20031}
      -o ${VBS_SRT_WHEP_PASSTHROUGH_1:-0.0.0.0:18881}
      -p ${VBS_SRT_WHEP_HTTP_PORT_1:-18001}
      -s ${VBS_SRT_WHEP_MODE_1:-caller}

  vbs-srt-whep-2:
    image: eyevinntechnology/srt-whep:latest
    restart: always
    network_mode: host
    depends_on:
      - vbs-open-live
    command: >
      -i ${VBS_SRT_WHEP_INPUT_2:-127.0.0.1:20032}
      -o ${VBS_SRT_WHEP_PASSTHROUGH_2:-0.0.0.0:18882}
      -p ${VBS_SRT_WHEP_HTTP_PORT_2:-18002}
      -s ${VBS_SRT_WHEP_MODE_2:-caller}

  vbs-srt-whep-3:
    image: eyevinntechnology/srt-whep:latest
    restart: always
    network_mode: host
    depends_on:
      - vbs-open-live
    command: >
      -i ${VBS_SRT_WHEP_INPUT_3:-127.0.0.1:20033}
      -o ${VBS_SRT_WHEP_PASSTHROUGH_3:-0.0.0.0:18883}
      -p ${VBS_SRT_WHEP_HTTP_PORT_3:-18003}
      -s ${VBS_SRT_WHEP_MODE_3:-caller}

  vbs-srt-whep-4:
    image: eyevinntechnology/srt-whep:latest
    restart: always
    network_mode: host
