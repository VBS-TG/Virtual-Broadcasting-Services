      -s ${VBS_SRT_WHEP_MODE_4:-caller}

  vbs-srt-whep-5:
    image: eyevinntechnology/srt-whep:latest
    restart: always
    network_mode: host
    depends_on:
      - vbs-open-live
    command: >
      -i ${VBS_SRT_WHEP_INPUT_5:-127.0.0.1:20035}
      -o ${VBS_SRT_WHEP_PASSTHROUGH_5:-0.0.0.0:18885}
      -p ${VBS_SRT_WHEP_HTTP_PORT_5:-18005}
      -s ${VBS_SRT_WHEP_MODE_5:-caller}

  vbs-srt-whep-6:
    image: eyevinntechnology/srt-whep:latest
