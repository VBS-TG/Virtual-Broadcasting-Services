server {
    listen 18010;
    server_name vbsrtc.cyblisswisdom.org;

    # WHEP requires POST (SDP offer) and DELETE (session teardown).
    # Keep CORS permissive here; auth is enforced at higher layers/network boundaries.
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET,POST,DELETE,OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type,Authorization" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    location = /whep/input1 {
        proxy_pass http://127.0.0.1:18001/channel;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /whep/input2 {
