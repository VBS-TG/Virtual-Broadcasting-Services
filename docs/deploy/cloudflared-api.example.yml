# Console/API Cloudflare Tunnel（api 子網域）
# service token 驗證在 Console app 層執行（CF-Access-Client-* headers）

tunnel: vbs-console-api
credentials-file: /etc/cloudflared/vbs-console-api.json

ingress:
  - hostname: api.yourdomain.com
    # 與 docker-compose.console.yml 主機埠 5000→4000 對齊（本機 cloudflared 連主機 5000）
    service: http://127.0.0.1:5000
  - service: http_status:404

