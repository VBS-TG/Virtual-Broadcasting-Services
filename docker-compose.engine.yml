# VBS-Engine：需安裝 nvidia-container-toolkit，主機需 NVIDIA 驅動。
# 必填變數（SRT URI、Console、Cloudflare Access）請寫入同目錄 .env.engine（勿提交版本庫）。
# 若無 .env.engine，Compose 不會再對缺漏的 ${VAR} 發警告；請仍須建立該檔後再啟動。
# 若出現 orphan containers（例如舊版曾含 nginx）：`docker compose -f docker-compose.engine.yml up -d --build --remove-orphans`
services:
  vbs-engine:
    build:
      context: .
      dockerfile: apps/engine/Dockerfile
    network_mode: host
    runtime: nvidia
    env_file:
      - path: .env.engine
        required: false
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - VBS_ENGINE_MIXER_WIDTH=854
      - VBS_ENGINE_MIXER_HEIGHT=480
      # PGM：預設僅 TCPmpeg（ffmpeg→SRT）；Brave WebRTC 需 VBS_ENGINE_BRAVE_ENABLE_WEBRTC=1
      # - VBS_ENGINE_BRAVE_ENABLE_WEBRTC=1
      # - VBS_ENGINE_BRAVE_ENABLE_AUDIO=0   # PGM 若僅需視訊可關閉 Brave 音訊管線（除錯／相容）
      # - VBS_ENGINE_USE_TEST_SOURCES=1     # 不依賴 SRT 入（兩路彩條）；仍須設定 VBS_ENGINE_PGM_SRT_URI
      # - VBS_ENGINE_PGM_TCP_WAIT_SEC=240   # 等待 Brave 於本機監聽 PGM TCP（預設 240）
      - PORT=5000
      - VBS_ENGINE_API_PORT=5000
      - VBS_ENGINE_PGM_TCP_PORT=30090
      - VBS_ENGINE_TELEMETRY_ENABLED=1
      - VBS_ENGINE_TELEMETRY_WS_PATH=/vbs/telemetry/ws
      - VBS_METRICS_INTERVAL_SEC=1
      - VBS_NODE_ID=vbs-engine
